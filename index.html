  <!-- Google tag (gtag.js) with Consent Mode v2 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TZL3J8NSPT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    window.gtag = gtag;

    // Default: deny everything until user grants consent (GDPR / KZ compliant)
    gtag('consent', 'default', {
      ad_storage: 'denied',
      ad_user_data: 'denied',
      ad_personalization: 'denied',
      analytics_storage: 'denied',
      functionality_storage: 'denied',
      personalization_storage: 'denied',
      security_storage: 'granted',
      wait_for_update: 500
    });

    // Apply previously stored consent (if any) before first config
    try {
      var stored = localStorage.getItem('pixap_cookie_consent_v1');
      if (stored) {
        var c = JSON.parse(stored);
        gtag('consent', 'update', {
          ad_storage: c.marketing ? 'granted' : 'denied',
          ad_user_data: c.marketing ? 'granted' : 'denied',
          ad_personalization: c.marketing ? 'granted' : 'denied',
          analytics_storage: c.analytics ? 'granted' : 'denied',
          functionality_storage: c.functional ? 'granted' : 'denied',
          personalization_storage: c.functional ? 'granted' : 'denied'
        });
      }
    } catch (e) {}

    gtag('js', new Date());
    gtag('config', 'G-TZL3J8NSPT', { anonymize_ip: true });
  </script>
